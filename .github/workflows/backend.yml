name: Backend CI

on:
  push:
    paths:
      - 'bimari-haunter/backend/**'
  pull_request:
    paths:
      - 'bimari-haunter/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r bimari-haunter/backend/requirements.txt
      - name: Download spaCy Transformer Model
        run: python -m spacy download en_core_web_trf
      - name: Install Playwright & Browsers with System Deps
        run: python -m playwright install --with-deps chromium
      - name: Pre-download Hugging Face Models
        run: python bimari-haunter/backend/scripts/download_models.py
      - name: Run tests
        env:
          PYTHONPATH: bimari-haunter/backend
        run: pytest -q bimari-haunter/backend/tests
      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: ./
